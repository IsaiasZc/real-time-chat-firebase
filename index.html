<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Firebase Chat</title>
    <link rel="stylesheet" href="styles/style.css" />
  </head>
  <body>
    <div id="auth-view">
      <h2>Firebase Chat</h2>
      <input id="email" type="email" placeholder="Email" />
      <input id="password" type="password" placeholder="Contraseña" />
      <button id="btn-login">Login</button>
      <button id="btn-register">Registrar</button>
      <p id="error-msg"></p>
    </div>

    <div id="app-view">
      <p>Bienvenido, <strong id="user-display"></strong></p>
      <p id="uid-display"></p>
      <button id="btn-logout">Cerrar sesión</button>

      <hr />

      <div>
        <h3>Iniciar chat</h3>
        <input id="other-uid" type="text" placeholder="UID del otro usuario" />
        <button id="btn-start-chat">Abrir chat</button>
      </div>

      <div id="chat-section">
        <hr />
        <h3 id="chat-title">Mensajes</h3>
        <div id="messages-list"></div>
        <div id="send-row">
          <input id="message-input" type="text" placeholder="Escribe un mensaje..." />
          <button id="btn-send">Enviar</button>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
