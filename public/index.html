<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Firebase Chat</title>
    <script type="module" crossorigin src="/assets/index-Cw8wdeoU.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-1PNmnjty.css">
  </head>
  <body>
    <div id="auth-view">
      <div class="auth-card">
        <h2>Firebase Chat</h2>
        <input id="email" type="email" placeholder="Email" />
        <input id="password" type="password" placeholder="Contraseña" />
        <input id="display-name" type="text" placeholder="Nombre (solo para registro)" />
        <div class="auth-buttons">
          <button id="btn-login">Entrar</button>
          <button id="btn-register">Registrar</button>
        </div>
        <p id="error-msg"></p>
      </div>
    </div>

    <div id="chat-view">
      <aside id="sidebar">
        <div id="user-info">
          <span id="user-display"></span>
          <button id="btn-logout">Salir</button>
        </div>
        <div class="sidebar-section">
          <div class="sidebar-label">Usuarios</div>
          <div id="users-list"></div>
        </div>
        <div class="sidebar-section">
          <div class="sidebar-label">Conversaciones</div>
          <div id="chats-list"></div>
        </div>
      </aside>

      <main id="main-panel">
        <div id="empty-state">Selecciona una conversación</div>
        <div id="chat-section">
          <div id="chat-header">
            <span id="chat-title"></span>
          </div>
          <div id="messages-list"></div>
          <div id="send-row">
            <input id="message-input" type="text" placeholder="Escribe un mensaje..." />
            <button id="btn-send">Enviar</button>
          </div>
        </div>
      </main>
    </div>

  </body>
</html>
